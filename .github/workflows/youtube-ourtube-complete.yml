name: YouTube Complete Ourtube Method

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      quality:
        description: 'Quality (360, 480, 720, 1080, best)'
        default: '720'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (20 seconds)..."
          sleep 20
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip install --upgrade yt-dlp brotli certifi mutagen pycryptodomex websockets

      - name: Download Video with Full Ourtube Methods
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          QUALITY: ${{ github.event.inputs.quality }}
          COOKIES_SECRET: ${{ secrets.COOKIES }}
        run: |
          if [ -n "$COOKIES_SECRET" ]; then
            echo "$COOKIES_SECRET" > cookies.txt
            echo "Cookies loaded"
          else
            echo "No cookies secret found. Proceeding without cookies."
          fi

          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          elif [ "$QUALITY" = "1080" ]; then
            FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
          elif [ "$QUALITY" = "720" ]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "$QUALITY" = "480" ]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="bestvideo[height<=360]+bestaudio/best[height<=360]"
          fi

          COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output video.%(ext)s --no-part --no-playlist --retries 10 --fragment-retries 10 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"

          if [ -f cookies.txt ]; then
            COMMON_FLAGS="$COMMON_FLAGS --cookies cookies.txt"
          fi

          # 8 روش دانلود مانند Ourtube
          METHODS=(
            "yt-dlp --proxy socks5://127.0.0.1:1080 --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=web\" --js-runtimes deno --remote-components ejs:github --user-agent \"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36\" \"$VIDEO_URL\""
            "yt-dlp --proxy socks5://127.0.0.1:1080 --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=web\" --js-runtimes deno --remote-components ejs:npm \"$VIDEO_URL\""
            "yt-dlp --proxy socks5://127.0.0.1:1080 --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=web,mweb,android_vr\" --js-runtimes deno --remote-components ejs:github \"$VIDEO_URL\""
            "yt-dlp --proxy socks5://127.0.0.1:1080 --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=mweb\" \"$VIDEO_URL\""
            "yt-dlp --proxy socks5://127.0.0.1:1080 --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=android_vr\" \"$VIDEO_URL\""
            "yt-dlp --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=web\" --js-runtimes deno --remote-components ejs:github \"$VIDEO_URL\""
            "yt-dlp --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=mweb\" \"$VIDEO_URL\""
            "yt-dlp --proxy socks5://127.0.0.1:1080 --format \"$FORMAT\" $COMMON_FLAGS --extractor-args \"youtube:player_client=android\" \"$VIDEO_URL\""
          )

          SUCCESS=0
          for i in "${!METHODS[@]}"; do
            echo "========================================="
            echo "Trying method $((i+1))/${#METHODS[@]}"
            echo "========================================="
            eval ${METHODS[$i]} && { SUCCESS=1; break; }
            echo "Method $((i+1)) failed, trying next..."
          done

          if [ $SUCCESS -eq 0 ]; then
            echo "All methods failed."
            exit 1
          fi

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Upload to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .mp4 .webm .mkv .jpg 2>/dev/null || echo "No media files"
          git commit -m "Downloaded with full Ourtube method [skip ci]" || echo "Nothing to commit"
          git push
