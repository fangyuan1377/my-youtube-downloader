name: YouTube 360p (Ourtube Method)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deno & yt-dlp
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip install --upgrade yt-dlp

      - name: Download with Ourtube method 1 (no proxy)
        run: |
          yt-dlp \
            --format "bestvideo[height<=360]+bestaudio/best[height<=360]" \
            --merge-output-format mp4 \
            --extractor-args "youtube:player_client=web" \
            --js-runtimes deno \
            --remote-components ejs:github \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            "${{ github.event.inputs.url }}"

      - name: Upload to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.mkv *.webm 2>/dev/null || echo "No files"
          git commit -m "Add 360p video via Ourtube method" || echo "Nothing to commit"
          git push
