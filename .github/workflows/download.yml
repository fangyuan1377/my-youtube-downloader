name: YouTube Free Downloader (Ourtube-like)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Quality (best, 1080, 720, 480, audio)'
        default: '720'
        required: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp with extras
        run: |
          pip install --upgrade yt-dlp brotli certifi mutagen pycryptodomex websockets
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download with POT token method
        run: |
          # آماده‌سازی کوکی در صورت وجود
          if [ -n "${{ secrets.COOKIES }}" ]; then
            echo "${{ secrets.COOKIES }}" > cookies.txt
            COOKIE_OPT="--cookies cookies.txt"
          else
            COOKIE_OPT=""
          fi

          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.url }}"

          # انتخاب کیفیت
          if [ "$QUALITY" = "audio" ]; then
            yt-dlp $COOKIE_OPT -f "bestaudio" --extract-audio --audio-format mp3 \
              --extractor-args "youtube:player_client=android,web;player_skip=webpage;formats=missing_pot" \
              "$URL"
          elif [ "$QUALITY" = "best" ]; then
            yt-dlp $COOKIE_OPT -f "bestvideo+bestaudio/best" --merge-output-format mp4 \
              --extractor-args "youtube:player_client=android,web;player_skip=webpage;formats=missing_pot" \
              "$URL"
          else
            # کیفیت عددی مثل 720، 480
            yt-dlp $COOKIE_OPT -f "bestvideo[height<=$QUALITY]+bestaudio/best[height<=$QUALITY]" \
              --merge-output-format mp4 \
              --extractor-args "youtube:player_client=android,web;player_skip=webpage;formats=missing_pot" \
              "$URL"
          fi

      - name: Upload video to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.webm *.mkv *.mp3 2>/dev/null || echo "No media files"
          git commit -m "Downloaded via free method [skip ci]" || echo "Nothing to commit"
          git push
